  <text x="346" y="130" text-anchor="middle" font-size="11" fill="#7F77DD">MultiCluster Engine</text>

  <!-- Arrow MCE → HyperShift -->
  <line x1="346" y1="148" x2="346" y2="162" stroke="#534AB7" stroke-width="1.2" marker-end="url(#arr)"/>

