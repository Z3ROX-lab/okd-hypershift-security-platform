  <text x="645" y="150" text-anchor="middle" font-size="11" fill="#378ADD">westeurope</text>

  <!-- worker-1 -->
  <rect x="526" y="162" width="108" height="56" rx="8" fill="#1a2a3a" stroke="#0C447C" stroke-width="0.8"/>
  <text x="580" y="186" text-anchor="middle" font-size="12" font-weight="600" fill="#85B7EB">worker-1</text>
  <text x="580" y="204" text-anchor="middle" font-size="11" fill="#378ADD">D4s_v3 Spot</text>

  <!-- worker-2 -->
  <rect x="656" y="162" width="108" height="56" rx="8" fill="#1a2a3a" stroke="#0C447C" stroke-width="0.8"/>
  <text x="710" y="186" text-anchor="middle" font-size="12" font-weight="600" fill="#85B7EB">worker-2</text>
  <text x="710" y="204" text-anchor="middle" font-size="11" fill="#378ADD">D4s_v3 Spot</text>

  <!-- Cluster Autoscaler -->
  <rect x="526" y="234" width="238" height="48" rx="8" fill="#2a1e08" stroke="#854F0B" stroke-width="0.8"/>
  <text x="645" y="256" text-anchor="middle" font-size="12" font-weight="600" fill="#EF9F27">Cluster Autoscaler</text>
  <text x="645" y="272" text-anchor="middle" font-size="11" fill="#BA7517">1 → 5 nodes</text>

  <!-- Tailscale agent -->
  <rect x="526" y="296" width="238" height="42" rx="8" fill="#0a1829" stroke="#185FA5" stroke-width="0.8"/>
  <text x="645" y="322" text-anchor="middle" font-size="12" font-weight="600" fill="#85B7EB">Tailscale agent</text>

  <!-- mTLS arrow -->
  <path d="M 464 499 C 487 499 490 350 510 350" fill="none" stroke="#185FA5" stroke-width="1.8" stroke-dasharray="7 3" marker-end="url(#arr-blue)"/>
  <text x="492" y="430" text-anchor="middle" font-size="11" fill="#378ADD">mTLS</text>

  <!-- Legend -->
  <rect x="510" y="384" width="270" height="108" rx="8" fill="#111c1a" stroke="#2a2a2a" stroke-width="0.8"/>
  <text x="522" y="404" font-size="11" fill="#888780">Légende</text>
  <line x1="522" y1="420" x2="556" y2="420" stroke="#185FA5" stroke-width="1.8" stroke-dasharray="7 3"/>
  <text x="564" y="424" font-size="11" fill="#888780">Tailscale mTLS</text>
  <line x1="522" y1="442" x2="556" y2="442" stroke="#3B6D11" stroke-width="1" stroke-dasharray="5 3"/>
  <text x="564" y="446" font-size="11" fill="#888780">Images Harbor</text>
  <line x1="522" y1="464" x2="556" y2="464" stroke="#534AB7" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="564" y="468" font-size="11" fill="#888780">Dépendance</text>
  <rect x="522" y="476" width="12" height="12" rx="2" fill="#1D9E75"/>
  <text x="542" y="487" font-size="11" fill="#888780">Déjà déployé</text>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#185FA5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#3B6D11" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
