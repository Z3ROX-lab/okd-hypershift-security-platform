  <rect x="510" y="20" width="270" height="64" rx="10" fill="#1a3a1a" stroke="#3B6D11" stroke-width="1"/>
  <text x="645" y="48" text-anchor="middle" font-size="13" font-weight="600" fill="#97C459">Harbor VM</text>
  <text x="645" y="66" text-anchor="middle" font-size="11" fill="#639922">harbor.okd.lab · 192.168.241.20</text>

