  <!-- Stack existante -->
  <rect x="36" y="84" width="176" height="152" rx="10" fill="#1a3a1a" stroke="#3B6D11" stroke-width="1"/>
  <text x="124" y="108" text-anchor="middle" font-size="13" font-weight="600" fill="#97C459">Stack existante</text>
  <text x="124" y="126" text-anchor="middle" font-size="11" fill="#639922">✓ Keycloak · Vault</text>
  <text x="124" y="142" text-anchor="middle" font-size="11" fill="#639922">✓ ArgoCD · ESO</text>
  <text x="124" y="158" text-anchor="middle" font-size="11" fill="#639922">✓ Grafana · Loki</text>
  <text x="124" y="174" text-anchor="middle" font-size="11" fill="#639922">✓ Kyverno</text>
  <text x="124" y="190" text-anchor="middle" font-size="11" fill="#639922">✓ Actions Runner</text>
  <text x="124" y="206" text-anchor="middle" font-size="11" fill="#639922">✓ Harbor VM</text>
  <text x="124" y="222" text-anchor="middle" font-size="11" fill="#639922">✓ Tailscale Router</text>

  <!-- MCE Operator -->
