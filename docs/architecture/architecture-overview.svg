  <text x="250" y="288" text-anchor="middle" font-size="11" fill="#D85A30">HostedCluster CR</text>

  <!-- HCP pods -->
  <rect x="52" y="298" width="118" height="56" rx="8" fill="#3a2020" stroke="#5a3030" stroke-width="0.8"/>
  <text x="111" y="322" text-anchor="middle" font-size="12" font-weight="600" fill="#F0997B">kube-apiserver</text>
  <text x="111" y="340" text-anchor="middle" font-size="11" fill="#D85A30">pod</text>

  <rect x="192" y="298" width="118" height="56" rx="8" fill="#3a2020" stroke="#5a3030" stroke-width="0.8"/>
  <text x="251" y="322" text-anchor="middle" font-size="12" font-weight="600" fill="#F0997B">etcd</text>
  <text x="251" y="340" text-anchor="middle" font-size="11" fill="#D85A30">pod</text>

  <rect x="332" y="298" width="118" height="56" rx="8" fill="#3a2020" stroke="#5a3030" stroke-width="0.8"/>
  <text x="391" y="322" text-anchor="middle" font-size="12" font-weight="600" fill="#F0997B">controllers</text>
  <text x="391" y="340" text-anchor="middle" font-size="11" fill="#D85A30">pods</text>

