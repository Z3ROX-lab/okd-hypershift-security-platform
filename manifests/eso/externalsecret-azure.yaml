# =============================================================================
# externalsecret-azure.yaml — Credentials SP Azure depuis Vault
# À appliquer après création du SP et stockage dans Vault
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: azure-credentials
  namespace: clusters
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-cluster-backend
    kind: ClusterSecretStore
  target:
    name: azure-credentials
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        # Format attendu par HyperShift Azure provider
        AZURE_CLIENT_ID:       "{{ .client_id }}"
        AZURE_CLIENT_SECRET:   "{{ .client_secret }}"
        AZURE_TENANT_ID:       "{{ .tenant_id }}"
        AZURE_SUBSCRIPTION_ID: "{{ .subscription_id }}"
  data:
    - secretKey: client_id
      remoteRef:
        key: hypershift/azure
        property: client-id
    - secretKey: client_secret
      remoteRef:
        key: hypershift/azure
        property: client-secret
    - secretKey: tenant_id
      remoteRef:
        key: hypershift/azure
        property: tenant-id
    - secretKey: subscription_id
      remoteRef:
        key: hypershift/azure
        property: subscription-id
