# =============================================================================
# hosted-cluster.yaml — HostedCluster CR HyperShift Azure
# ⚠️  Ne pas appliquer directement — utiliser scripts/deploy-hostedcluster.sh
# =============================================================================
apiVersion: hypershift.openshift.io/v1beta1
kind: HostedCluster
metadata:
  name: okd-azure-nodepools
  namespace: clusters
  annotations:
    hypershift.openshift.io/skip-release-image-validation: "true"
spec:
  release:
    image: "quay.io/openshift/okd:4.15.0-0.okd-2024-03-10-010116"

  platform:
    type: Azure
    azure:
      azureAuthenticationConfig:
        azureAuthenticationConfigType: ManagedIdentities
        armDNSPrefix: okd-azure-nodepools
        cloud: AzurePublicCloud
        credentialsSecretRef:
          name: azure-credentials
          namespace: clusters
      location: westeurope
      resourceGroup: ${AZURE_RESOURCE_GROUP}
      subscriptionID: ${AZURE_SUBSCRIPTION_ID}
      tenantID: ${AZURE_TENANT_ID}
      vnetID: ${AZURE_VNET_ID}
      subnetID: ${AZURE_SUBNET_ID}
      securityGroupID: ${AZURE_NSG_ID}

  dns:
    baseDomain: sno.okd.lab

  networking:
    clusterNetwork:
      - cidr: 10.132.0.0/14
    serviceNetwork:
      - cidr: 172.31.0.0/16
    machineNetwork:
      - cidr: 10.0.0.0/16
    networkType: OVNKubernetes

  # Services exposés par le Hosted Control Plane
  services:
    - service: APIServer
      servicePublishingStrategy:
        type: LoadBalancer
    - service: OAuthServer
      servicePublishingStrategy:
        type: Route
    - service: Konnectivity
      servicePublishingStrategy:
        type: Route
    - service: Ignition
      servicePublishingStrategy:
        type: Route
    - service: OVNSbDb
      servicePublishingStrategy:
        type: Route

  pullSecret:
    name: pull-secret

  sshKey:
    name: ssh-key

  infraID: okd-azure-nodepools

  etcd:
    managed:
      storage:
        persistentVolume:
          size: 8Gi
        type: PersistentVolume
    managementType: Managed

  controllerAvailabilityPolicy: SingleReplica
  infrastructureAvailabilityPolicy: SingleReplica

  autoscaling: {}
